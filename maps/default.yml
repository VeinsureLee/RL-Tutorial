map:
  size: [25, 25]
  num_agents: 2
  num_goals: 2

  # 25x25 网格上排成 2x2 的四个房间，相邻房间共享墙体：
  #   TL 左上：top_left=[0, 0]   size=[13, 13]   占行 0-12, 列 0-12
  #   TR 右上：top_left=[0, 12]  size=[13, 13]   占行 0-12, 列 12-24
  #   BL 左下：top_left=[12, 0]  size=[13, 13]   占行 12-24, 列 0-12
  #   BR 右下：top_left=[12, 12] size=[13, 13]   占行 12-24, 列 12-24
  rooms:
    - id: room_tl
      top_left: [0, 0]
      size: [13, 13]
    - id: room_tr
      top_left: [0, 12]
      size: [13, 13]
    - id: room_bl
      top_left: [12, 0]
      size: [13, 13]
    - id: room_br
      top_left: [12, 12]
      size: [13, 13]

  # 四扇门开在四对相邻房间的共享墙上：
  #   [6, 12]   TL <-> TR (共享列 12)
  #   [18, 12]  BL <-> BR (共享列 12)
  #   [12, 6]   TL <-> BL (共享行 12)
  #   [12, 18]  TR <-> BR (共享行 12)
  doors:
    - position: [6, 12]
    - position: [18, 12]
    - position: [12, 6]
    - position: [12, 18]

  # Agents 在两个上房间起步；Goals 在对角下房间——每个 agent 至少要穿过两扇门
  agents_start: [[2, 2], [2, 22]]
  goals:        [[22, 22], [22, 2]]
