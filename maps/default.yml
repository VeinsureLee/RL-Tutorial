map:
  size: [15, 15]
  num_agents: 2
  num_goals: 2

  # 三个相邻房间，共享墙体：
  #   room_1：左上 7x8（行 0-6，列 0-7），右墙在列 7
  #   room_2：右上 7x8（行 0-6，列 7-14），与 room_1 共享列 7
  #   room_3：底部 9x15（行 6-14，列 0-14），与上方两房间共享行 6
  rooms:
    - id: room_1
      top_left: [0, 0]
      size: [7, 8]
    - id: room_2
      top_left: [0, 7]
      size: [7, 8]
    - id: room_3
      top_left: [6, 0]
      size: [9, 15]

  # 门必须开在房间的共享墙上：
  #   [3, 7]   room_1 <-> room_2 共享的列 7
  #   [6, 4]   room_1 <-> room_3 共享的行 6
  #   [6, 11]  room_2 <-> room_3 共享的行 6
  doors:
    - position: [3, 7]
    - position: [6, 4]
    - position: [6, 11]

  agents_start: [[1, 1], [1, 13]]
  goals:        [[13, 1], [13, 13]]
