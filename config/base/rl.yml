description: "DQN / MADQN hyperparameters (ported from commit 3bede13 — empirically convergent)"

algo:
  value: "madqn"
  description: "Algorithm: dqn or madqn"

lr:
  value: 1.0e-4
  description: "Learning rate (matching agent_scan_goal50_lr1e-4: lowered from 1e-3 to stabilize larger N)"

gamma:
  value: 0.99
  description: "Discount factor (3bede13 = 0.99; effective horizon ~100 steps)"

epsilon:
  value: 0.8
  description: "Initial exploration rate (reset at the start of each iteration)"

epsilon_min:
  value: 0.15
  description: "Minimum exploration rate (matching agent_scan_goal50_lr1e-4)"

epsilon_decay:
  value: 0.95
  description: "Epsilon decay per episode"

num_iterations:
  value: 5
  description: "Outer iterations (matching agent_scan_goal50_lr1e-4: 1 iter x 50 ep)"

num_episodes:
  value: 50
  description: "Episodes per iteration"

episode_length:
  value: 5000
  description: "Max steps per episode"

batch_size:
  value: 64
  description: "Minibatch size for Q update (3bede13 = 64)"

hidden_dim:
  value: 128
  description: "Q-network hidden layer size"

update_freq:
  value: 10
  description: "Target-network sync frequency (every N env steps; 3bede13 = 10)"

replay_buffer_size:
  value: 50000
  description: "Replay buffer capacity"

train_interval:
  value: 4
  description: "Gradient update frequency (every N env steps). DQN-Nature standard = 4. =1 burns ~32 ms/step on K backprops with no convergence gain (off-policy can replay samples)."

test_max_steps:
  value: 500
  description: "Max steps at test time"

model_dir:
  value: "models"
  description: "Directory for .pth checkpoints"
