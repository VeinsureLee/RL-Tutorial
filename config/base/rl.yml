description: "RL hyperparameters: DQN / MADQN / QMIX / VDN / PPO / MAPPO"

algo:
  value: "madqn"
  description: "Algorithm: dqn | madqn | shared_madqn | qmix | vdn | ppo | mappo"

# --- Common ---
lr:
  value: 1.0e-4
  description: "Learning rate (DQN/MADQN: 1e-4; PPO/MAPPO: override to 3e-4)"

gamma:
  value: 0.99
  description: "Discount factor (effective horizon ~100 steps)"

num_iterations:
  value: 5
  description: "Outer iterations"

num_episodes:
  value: 50
  description: "Episodes per iteration"

episode_length:
  value: 5000
  description: "Max steps per episode"

batch_size:
  value: 64
  description: "Minibatch size for gradient updates"

hidden_dim:
  value: 128
  description: "Hidden layer size for Q / Actor-Critic networks"

test_max_steps:
  value: 500
  description: "Max steps at test time"

model_dir:
  value: "models"
  description: "Directory for .pth checkpoints"

# --- Off-policy only (DQN / MADQN / QMIX / VDN) ---
epsilon:
  value: 0.8
  description: "Initial exploration rate (reset at the start of each iteration)"

epsilon_min:
  value: 0.15
  description: "Minimum exploration rate"

epsilon_decay:
  value: 0.95
  description: "Epsilon decay per episode"

update_freq:
  value: 10
  description: "Target-network sync frequency (every N env steps)"

replay_buffer_size:
  value: 50000
  description: "Replay buffer capacity"

train_interval:
  value: 4
  description: "Gradient update frequency (every N env steps)"

# --- On-policy only (PPO / MAPPO) ---
update_interval:
  value: 1024
  description: "PPO: rollout length — steps between policy updates"

gae_lambda:
  value: 0.95
  description: "PPO: GAE lambda for advantage estimation"

clip_epsilon:
  value: 0.15
  description: "PPO: clipping epsilon for policy ratio"

entropy_coef:
  value: 0.01
  description: "PPO: entropy bonus coefficient (encourages exploration)"

value_coef:
  value: 0.5
  description: "PPO: value loss coefficient"

ppo_epochs:
  value: 5
  description: "PPO: number of epochs to reuse each rollout"

ppo_lr:
  value: 1e-4
  description: "PPO: recommended learning rate (override via --lr 3e-4)"
