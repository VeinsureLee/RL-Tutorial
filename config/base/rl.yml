description: "DQN / MADQN 训练与测试参数（对齐论文参数表）"

algo:
  value: "madqn"
  description: "算法选择：dqn 或 madqn"

lr:
  value: 1.0e-4
  description: "学习率（论文 0.0001）"

gamma:
  value: 0.9
  description: "折扣因子（论文 0.9）"

epsilon:
  value: 0.5
  description: "初始探索率（从 0.5 衰减到 epsilon_min）"

epsilon_min:
  value: 0.01
  description: "最小探索率"

epsilon_decay:
  value: 0.99
  description: "探索率衰减系数（每 episode 乘以此值）"

num_iterations:
  value: 5
  description: "外层迭代数（每轮重置 epsilon，避免局部最优）"

num_episodes:
  value: 50
  description: "每个 iteration 内的 episode 数"

episode_length:
  value: 5000
  description: "每个 episode 最大步数"

batch_size:
  value: 128
  description: "采样批次（论文 D_0=128）"

mini_batch_size:
  value: 128
  description: "小批量采样大小"

hidden_dim:
  value: 128
  description: "Q-网络隐藏层维度"

update_freq:
  value: 100
  description: "目标网络更新频率（论文 N_0=100）"

replay_buffer_size:
  value: 50000
  description: "经验池大小（论文 50000）"

test_max_steps:
  value: 500
  description: "测试时最大步数"

model_dir:
  value: "models"
  description: "模型保存/加载目录"
