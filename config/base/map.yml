description: "Map size and forbidden-square generation (ported from commit 3bede13)"

map_size:
  value: [48, 24]
  description: "Grid size (rows, cols). 3bede13 uses 48x24 (physical 19.2m x 9.6m at grid=0.4m)."

antenna_position:
  value: [24, 12]
  description: "Antenna (x, y) grid coord, center of map in 3bede13"

number_of_robots:
  value: 8
  description: "Number of robots/agents (3bede13 trained MADQN with 8 agents)"

num_forbidden_squares:
  value: 5
  description: "Number of square forbidden regions"

square_size_range:
  value: [3, 5]
  description: "Side length range of forbidden squares (3bede13 = [3, 5])"

h_AP:
  value: 2.0
  description: "Access-point height (m)"

h_robot:
  value: 1.5
  description: "Robot receiver antenna height (m)"

h_block:
  value: 3.0
  description: "Obstacle height (m)"
