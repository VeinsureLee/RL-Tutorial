description: "Map size and forbidden-square generation (ported from commit 3bede13)"

map_size:
  value: [120, 60]
  description: "Grid size (rows, cols). Paper-aligned: physical 48m x 24m at grid=0.4m."

antenna_position:
  value: [60, 30]
  description: "Antenna (x, y) grid coord, center of 120x60 map (physical 24m, 12m)."

number_of_robots:
  value: 4
  description: "Number of robots/agents. Currently set for QMIX scan."

num_forbidden_squares:
  value: 5
  description: "Number of square forbidden regions"

square_size_range:
  value: [3, 5]
  description: "Side length range of forbidden squares (3bede13 = [3, 5])"

h_AP:
  value: 2.0
  description: "Access-point height (m)"

h_robot:
  value: 1.5
  description: "Robot receiver antenna height (m)"

h_block:
  value: 3.0
  description: "Obstacle height (m)"
