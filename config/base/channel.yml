# 通信信道参数 (对应 config/param_arguments.py)
description: "通信信道相关参数"

carrier_frequency:
  value: 3.5
  description: "指定载波频率 (GHz)"

sigma_rayleigh:
  value: 1.2
  description: "Rayleigh 分布的 sigma，室内门场景通常设为 1.2"

number_of_antenna:
  value: 128
  description: "天线数量"

power_AWGN:
  value: -143.0
  description: "加性高斯白噪声功率谱密度 (dBm/Hz)"

channel_bandwidth:
  value: 1.0e+7
  description: "信道带宽 (Hz)，默认 10 MHz，噪声总功率 = N0 * bandwidth"

channel_block_length:
  value: 8
  description: "信道块长度（有限块长 BER 公式中的 N）。N 越小，BER 对 SINR 越敏感；N=8 时 BER 在 0~10dB 范围有明显梯度"

packet_size:
  value: 7
  description: "数据包大小（有限块长 BER 公式中的 D）。D/N 为编码率，越接近 1 则 BER 越高"

total_power:
  value: 1.0
  description: "总发射功率（瓦特），用于 NOMA 功率分配"

rho_min:
  value: 0.01
  description: "SIC 所需最小功率差（瓦特），满足 (P2-P1)*g1 >= rho_min"

P_max:
  value: 100.0
  description: "最大发射功率（瓦特），可选 50, 100, 150, 200, 250"

P_min:
  value: 5.0
  description: "最小发射功率（瓦特）"
