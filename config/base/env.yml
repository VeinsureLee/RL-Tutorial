# 环境参数 (对应 config/env_arguments.py)
description: "强化学习/仿真环境相关参数"

map_size:
  value: [48, 24]
  description: "环境尺寸 (rows, cols)，通常与地图一致"

grid_size:
  value: 0.4
  description: "网格大小"

reward_target:
  value: 10
  description: "到达目标时的奖励"

reward_forbidden:
  value: -5
  description: "进入禁区时的奖励（惩罚）"

reward_step:
  value: -1
  description: "每步移动的奖励"

reward_closer_to_target:
  value: 1
  description: "每步更靠近目标时的奖励"

reward_ber_weight:
  value: 0.2
  description: "通信质量奖励权重。每步通信奖励范围 [-weight, +weight]，应远小于导航奖励（靠近目标+1），仅在路径选择时起 tie-breaker 作用"

action_space:
  value:
    - [0, 1]   # down
    - [1, 0]   # right
    - [0, -1]  # up
    - [-1, 0]  # left
    - [0, 0]   # stay
  description: "动作空间 (下, 右, 上, 左, 停留)"

debug:
  value: false
  description: "是否开启调试模式"

animation_interval:
  value: 0.2
  description: "动画帧间隔 (秒)"

antenna_position:
  value: [24, 12]
  description: "天线在地图中的位置 (x, y)"